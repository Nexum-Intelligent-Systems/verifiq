# VerifIQ — Continuous Integration
#
# The core merge gate: a hygiene guard + typecheck + lint + unit/integration
# tests on every PR and push to main (file 20 §7; ADR-001). Runs from a CLEAN
# checkout — every generated artifact (Convex `_generated/`, the prompt bundle)
# is produced here, never relied on from a dirty working tree — so a missing or
# mis-named generated file (the class of bug that kept slipping through) fails
# CI even when it passes on a contributor's machine. Offline against the
# committed `_generated` stub (no Convex/provider secrets needed); a follow-up
# job adds `convex codegen` + the validation-pack test once deploy secrets exist.
name: CI

on:
  push:
    branches: [main]
    paths: ["verifiq26/**", ".github/workflows/ci.yml"]
  pull_request:
    paths: ["verifiq26/**", ".github/workflows/ci.yml"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck · lint · test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: verifiq26
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: verifiq26/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Repo hygiene (ADR-001): no duplicate package.json keys, no tracked file
      # that is gitignored, no committed generated artifact. Catches the two-track
      # merge debris that has broken main before the build even runs.
      - name: Repo hygiene guard
        run: npm run check:hygiene

      # Generate src/convex/_generated/ (gitignored). Offline stub for now;
      # replace with `npx convex codegen` once a CONVEX_DEPLOY_KEY secret exists.
      - name: Generate Convex types
        run: npm run codegen:stub

      - name: Bundle prompts (for the Convex runtime)
        run: npm run bundle:prompts

      - name: Typecheck (tsc --noEmit, strict)
        run: npm run typecheck

      - name: Lint (eslint)
        run: npm run lint

      - name: Test (vitest)
        run: npm test
